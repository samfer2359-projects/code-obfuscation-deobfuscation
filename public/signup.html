<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="login.css">
   
</head>
<body>
  <div class="login-container">
    <h2>Create Account</h2>
    <form action="signup.php" method="post">
      

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required autocomplete="username">

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required autocomplete="new-password">

      <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>

    
  </div>
  <script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      let message = '';
      if (error === 'invalid_email') message = 'Please enter a valid email.';
      else if (error === 'insert_failed') message = 'Signup failed. Try again.';
      else if (error === 'request') message = 'Invalid request.';
      else message = 'An error occurred.';
      
      alert(message);
      // remove error from URL so alert doesn’t repeat on reload
      params.delete('error');
      const base = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
      window.history.replaceState({}, document.title, base);
    }
  })();
</script>

</body>
</html>
