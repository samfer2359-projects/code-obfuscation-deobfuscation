<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Obfuscator</title>
 <style>
  body {
    background-color: #fffdf7;
    color: #212121;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  form {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0 auto;
  }




  h1 {
    color: #212121;
    margin-bottom: 15px;
  }

  textarea {
    width: 90%;
    height: 200px;
    margin: 10px 0;
    padding: 12px;
    border: 2px solid #6b7280;
    border-radius: 8px;
    font-family: monospace;
    font-size: 16px;
    background: #ffffff;
    color: #212121;
    transition: border 0.3s ease;
  }

  textarea:focus {
    outline: none;
    border: 2px solid #4caf50;
  }

  button {
    background-color: #4caf50;
    color: #fff;
    border: none;
    padding: 12px 24px;
    margin: 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.3s ease;
  }

  button:hover {
    background-color: #388e3c;
  }
</style>

</head>
<body>
  <h1>Code Obfuscator</h1>
  <form id="obfuscateForm" method="post" action="../api/obfuscate.php">

  <textarea id="inputCode" name="original_code" placeholder="Paste your code here..."></textarea>
  <input type="text" id="language" name="language" placeholder="Enter language (e.g. PHP)" style="width: 90%; font-size: 14px; padding: 8px;">

 

  <div>
    <button type="submit">Obfuscate</button>
    <button onclick="clearText()">Clear</button>
  </div>
  <textarea id="outputCode" readonly placeholder="Obfuscated code will appear here..."></textarea>
  </form>
  <script>
    function clearText() {
      document.getElementById('inputCode').value = '';
      document.getElementById('outputCode').value = '';
      var lang = document.getElementById('language');
    if (lang) lang.value = '';
    }
    document.getElementById('obfuscateForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const input = document.getElementById('inputCode').value;
    const language = document.getElementById('language').value;

    if (!input || !language) {
      alert('Please provide code and language.');
      return;
    }
    // build form data
    const formData = new FormData();
    formData.append('original_code', input);
    formData.append('language', language);

    try {
      const res = await fetch('../api/obfuscate.php', {
        method: 'POST',
        credentials: 'same-origin',
        body: formData
      });

      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || 'Server error');
      }

      const data = await res.json();
      if (data.success) {
        // show base64 obfuscated blob in output textarea
        document.getElementById('outputCode').value = data.obfuscated_code;
        // optionally show obj_id etc (you can console.log)
        console.log('obj_id', data.obj_id, 'method', data.method_used);
      } else {
        alert('Error: ' + (data.error || 'Unknown error'));
      }
      } catch (err) {
      console.error(err);
      alert('Obfuscation failed: ' + err.message);
    }
  });
  </script>
</body>
</html>
