<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Login Page</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form action="login-validate.php" method="post">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
      
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
      
      <button type="submit">Login</button>
    </form>
    
    <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    
    

<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');

    if (error === 'invalid_credentials') {
      alert('Invalid credentials');
    } else if (error === 'request') {
      alert('Please use the login form to access this page.');
    } else if (error === 'not_logged_in') {
      alert('You must be logged in to submit code. Please log in first.');
    }

    if (error) {
      params.delete('error');
      const base = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
      window.history.replaceState({}, document.title, base);
    }
  })();
</script>


</body>
</html>
