<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Deobfuscator</title>
  <style>
    body {
      background-color:#f4d9a4;
      color: #2a2a2a;
      font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #531506;
    }
    textarea {
      width: 90%;
      height: 200px;
      margin: 10px 0;
      padding: 10px;
      border: 2px solid #8e5d34;
      border-radius: 5px;
      font-family: monospace;
      font-size: 16px;
    }
    button {
      background-color: #8e5d34;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #531506;
    }
  </style>
</head>
<body>
  <h1>Code Deobfuscator</h1>
  <textarea id="inputCode" placeholder="Paste obfuscated code here..."></textarea>
  <div>
    <button onclick="deobfuscate()">Deobfuscate</button>
    <button onclick="clearText()">Clear</button>
  </div>
  <textarea id="outputCode" readonly placeholder="Deobfuscated code will appear here..."></textarea>

  <script>
    function deobfuscate() {
      let code = document.getElementById('inputCode').value;
      try {
        let decoded = atob(code);
        let original = decoded.split('').reverse().join('');
        document.getElementById('outputCode').value = original;
      } catch {
        document.getElementById('outputCode').value = 'Invalid code!';
      }
    }

    function clearText() {
      document.getElementById('inputCode').value = '';
      document.getElementById('outputCode').value = '';
    }
  </script>
</body>
</html>
